<body>
    <form action="/submit" method="post">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" nama="nama" required><br><hr>

        <label for="email">Email:</label>
        <input type="email" id="email" nama="email" required<br><hr>

        <label for="message">Message:</label><br>
        <textarea id="message" nama="message" rows="4" cols="50" required></textarea><br><hr>

        <input type="submit" value="Submit">
    </form>
</body>
